<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <style>
        :root {
            --bg-body: #0f0f0f;
            --bg-container: #181818;
            --bg-input: #262626;
            --text-primary: #e4e4e4;
            --text-secondary: #9e9e9e;
            --accent: #bb86fc;
            --accent-hover: #d7b5fd;
            --border-color: #2f2f2f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .signup-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, #1e1e1e, #141414);
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.03);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: var(--accent);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInFields 0.5s ease forwards;
        }

        .input-group:nth-child(1) { animation-delay: 0.2s; }
        .input-group:nth-child(2) { animation-delay: 0.3s; }
        .input-group:nth-child(3) { animation-delay: 0.4s; }
        .input-group:nth-child(4) { animation-delay: 0.5s; }

        @keyframes fadeInFields {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background: #2d2d2d;
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.2);
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #bb86fc, #9a67ea);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-signup:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(187, 134, 252, 0.4);
        }

        .login-link {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .movie-icon {
            font-size: 20px;
            margin-top: 20px;
            opacity: 0.3;
            display: block;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>Criar Conta</h2>

        <form id="signupForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Seu nome de usuário" required>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label>Tipo de Conta</label>
                <select id="role">
                    <option value="user">Usuário</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn-signup">Finalizar Cadastro</button>
        </form>

        <div class="login-link">
            Já possui uma conta? <a href="login.html">Entrar agora</a>
        </div>

        <span class="movie-icon">🎬</span>
    </div>

</body>
</html>
