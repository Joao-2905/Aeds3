<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gerenciar Avaliações</title>

<style>
:root{
--bg-body:#0f0f0f;
--bg-container:#181818;
--bg-input:#262626;
--text-primary:#e4e4e4;
--text-secondary:#9e9e9e;
--accent:#bb86fc;
--border-color:#2f2f2f;
--danger:#cf6679;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:radial-gradient(circle at top,#1a1a1a,#0f0f0f);
color:var(--text-primary);
display:flex;
justify-content:center;
padding:30px;
height:100vh;
}

.main-container{
width:95%;
max-width:1000px;
height:90vh;
border-radius:14px;
background:linear-gradient(145deg,#1e1e1e,#141414);
box-shadow:
0 15px 50px rgba(0,0,0,.7),
inset 0 0 0 1px rgba(255,255,255,.03);
display:flex;
flex-direction:column;
overflow:hidden;
}

.tab-nav{
display:flex;
background:#121212;
border-bottom:1px solid var(--border-color);
}

.tab-button{
flex:1;
padding:18px;
background:transparent;
border:none;
color:var(--text-secondary);
cursor:pointer;
text-transform:uppercase;
font-size:12px;
letter-spacing:1px;
position:relative;
transition:.3s;
}

.tab-button:hover{
color:white;
}

.tab-button::after{
content:"";
position:absolute;
bottom:0;
left:50%;
width:0%;
height:3px;
background:var(--accent);
transition:.3s;
transform:translateX(-50%);
}

.tab-button:hover::after{
width:60%;
}

.tab-button.active{
color:var(--accent);
}

.tab-button.active::after{
width:100%;
}

.tab-content-wrapper{
flex:1;
padding:40px;
overflow-y:auto;
}

.tab-section{
display:none;
animation:fadeIn .3s ease;
}

.tab-section.active{
display:block;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

h2{
margin-bottom:25px;
color:var(--accent);
padding-bottom:8px;
position:relative;
}

h2::after{
content:"";
width:50px;
height:2px;
background:var(--accent);
position:absolute;
left:0;
bottom:0;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full-width{
grid-column:span 2;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-size:13px;
}

input,textarea{
width:100%;
padding:12px;
background:var(--bg-input);
border:1px solid var(--border-color);
border-radius:6px;
color:var(--text-primary);
}

input:focus,
textarea:focus{
outline:none;
border:1px solid var(--accent);
box-shadow:0 0 8px rgba(187,134,252,.4);
}

.search-box{
display:flex;
gap:15px;
background:rgba(255,255,255,.03);
padding:20px;
border-radius:8px;
margin-bottom:30px;
border:1px solid var(--border-color);
align-items:flex-end;
}

.btn-action{
padding:12px 20px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:600;
}

.btn-save{
background:linear-gradient(135deg,#bb86fc,#9a67ea);
color:black;
}

.btn-update{
margin-top:25px;
}

.btn-search{
background:#333;
color:white;
}

.btn-delete{
background:transparent;
border:1px solid var(--danger);
color:var(--danger);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid var(--border-color);
}

th{
font-size:12px;
color:var(--accent);
text-transform:uppercase;
}

tbody tr:hover{
background:rgba(255,255,255,.03);
}
</style>
</head>

<body>

<div class="main-container">

<nav class="tab-nav">
<button class="tab-button active" onclick="openTab(event,'lista')">Avaliações</button>
<button class="tab-button" onclick="openTab(event,'cadastrar')">Fazer Avaliação</button>
<button class="tab-button" onclick="openTab(event,'atualizar')">Atualizar</button>
<button class="tab-button" onclick="openTab(event,'excluir')">Excluir</button>
</nav>

<div class="tab-content-wrapper">

<section id="lista" class="tab-section active">

<h2>Todas as Avaliações</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Filme(ID)</th>
<th>Usuário(ID)</th>
<th>Nota</th>
<th>Comentário</th>
</tr>
</thead>

<tbody id="tabelaAvaliacoes">
</tbody>

</table>

</section>

<section id="cadastrar" class="tab-section">

<h2>Nova Avaliação</h2>

<div class="form-grid">

<div class="form-group">
<label>ID do Usuário</label>
<input type="number">
</div>

<div class="form-group">
<label>ID do Filme</label>
<input type="number">
</div>

<div class="form-group full-width">
<label>Nota</label>
<input type="number">
</div>

<div class="form-group full-width">
<label>Comentário</label>
<textarea rows="4"></textarea>
</div>

</div>

<button class="btn-action btn-save">
Enviar Avaliação
</button>

</section>

<section id="atualizar" class="tab-section">

<h2>Editar Avaliação</h2>

<div class="search-box">

<div style="flex:1">
<label>ID da Avaliação</label>
<input type="number">
</div>

<button class="btn-action btn-search">
Buscar
</button>

</div>

<div class="form-grid">

<div class="form-group">
<label>Nova Nota</label>
<input type="number">
</div>

<div class="form-group full-width">
<label>Novo Comentário</label>
<textarea rows="4"></textarea>
</div>

</div>

<button class="btn-action btn-save btn-update">
Atualizar
</button>

</section>

<section id="excluir" class="tab-section">

<h2>Excluir Avaliação</h2>

<div class="search-box">

<div style="flex:1">
<label>ID da Avaliação</label>
<input type="number">
</div>

<button class="btn-action btn-search">
Buscar
</button>

</div>

<button class="btn-action btn-delete">
Excluir
</button>

</section>

</div>
</div>

<script>
function openTab(evt,tabName){

let tabs=
document.getElementsByClassName("tab-section");

let buttons=
document.getElementsByClassName("tab-button");

for(let t of tabs)
t.classList.remove("active");

for(let b of buttons)
b.classList.remove("active");

document
.getElementById(tabName)
.classList.add("active");

evt.currentTarget
.classList.add("active");

}
</script>

</body>
</html>
