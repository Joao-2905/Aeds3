<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Avaliações</title>

<style>
:root{
--bg-body:#0f0f0f;
--bg-container:#181818;
--text-primary:#e4e4e4;
--text-secondary:#9e9e9e;
--accent:#bb86fc;
--border-color:#2f2f2f;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}
body{
background:radial-gradient(circle at top,#1a1a1a,#0f0f0f);
color:var(--text-primary);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}
.top-nav{
width:100%;
background:#121212;
border-bottom:1px solid var(--border-color);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
height:70px;
box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.tabs{
display:flex;
height:100%;
gap:15px;
}
.tab-link{
display:flex;
align-items:center;
padding:0 15px;
text-decoration:none;
color:var(--text-secondary);
font-weight:600;
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
position:relative;
transition:.3s;
}
.tab-link:hover{color:white;}
.tab-link::after{
content:"";
position:absolute;
bottom:0;
left:50%;
width:0%;
height:3px;
background:var(--accent);
transition:.3s;
transform:translateX(-50%);
}
.tab-link.active{color:var(--accent);}
.tab-link.active::after{width:100%;}
.btn-profile{
display:flex;
align-items:center;
gap:12px;
background:rgba(255,255,255,0.03);
border:1px solid var(--border-color);
padding:6px 16px;
border-radius:8px;
cursor:pointer;
color:var(--text-primary);
transition:.3s;
}
.btn-profile:hover{
border-color:var(--accent);
background:rgba(187,134,252,0.05);
}
.user-info{text-align:right;}
.user-label{
display:block;
font-size:10px;
color:var(--text-secondary);
font-weight:800;
text-transform:uppercase;
}
.user-name{
display:block;
font-size:13px;
font-weight:600;
}
.avatar{
width:24px;
height:24px;
background:var(--accent);
border-radius:4px;
}
.main-container{
width:95%;
max-width:1100px;
margin-top:30px;
margin-bottom:30px;
border-radius:14px;
background:linear-gradient(145deg,#1e1e1e,#141414);
box-shadow:0 15px 50px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.03);
padding:35px;
}
h2{
margin-bottom:25px;
color:var(--accent);
padding-bottom:8px;
position:relative;
}
h2::after{
content:"";
width:50px;
height:2px;
background:var(--accent);
position:absolute;
left:0;
bottom:0;
}
.message{
margin-top:18px;
font-size:14px;
font-weight:600;
color:#cf6679;
}
.btn-action{
padding:12px 20px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:600;
background:#333;
color:white;
margin-bottom:20px;
}
.review-card{
border:1px solid var(--border-color);
border-radius:10px;
padding:18px;
margin-bottom:20px;
background:rgba(255,255,255,.02);
}
.review-card h3{
color:var(--accent);
margin-bottom:12px;
}
.review-card p{
margin-bottom:8px;
}
.outras-reviews{
margin-top:16px;
padding-top:16px;
border-top:1px solid var(--border-color);
}
.outra-review{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}
.outra-review:last-child{
border-bottom:none;
}
</style>
</head>

<body>

<nav class="top-nav">
    <div class="tabs">
        <a href="menuUsuario.html" class="tab-link">Início</a>
        <a href="filmesUsuario.html" class="tab-link">🎬 Filmes</a>
        <a href="avaliacaoUsuario.html" class="tab-link">⭐ Minha Avaliação</a>
        <a href="minhasAvaliacoes.html" class="tab-link active">📝 Avaliações</a>
    </div>

    <button class="btn-profile" type="button" id="btnProfile">
        <div class="user-info">
            <span class="user-label">Meu Perfil</span>
            <span class="user-name" id="userNameLabel">Usuário</span>
        </div>
        <div class="avatar"></div>
    </button>
</nav>

<div class="main-container">
    <h2>Avaliações por Filme</h2>

    <button class="btn-action" onclick="carregarMinhasAvaliacoes()">Recarregar Lista</button>

    <div id="listaAvaliacoes">Carregando...</div>
    <div id="listaMessage" class="message"></div>
</div>

<script>
const API_FILMES = "http://localhost:8080/filmes";
const API_REVIEWS_FILME = "http://localhost:8080/reviews/filme";
let usuarioLogado = null;

try {
    usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
} catch (e) {
    usuarioLogado = null;
}

if (!usuarioLogado) {
    window.location.href = "index.html";
}

if (usuarioLogado.administrator === true) {
    window.location.href = "menuPrincipal.html";
}

document.getElementById("userNameLabel").textContent =
    usuarioLogado.username || usuarioLogado.email || "Usuário";

document.getElementById("btnProfile").addEventListener("click", function () {
    window.location.href = "profile.html";
});

function showMessage(text) {
    document.getElementById("listaMessage").textContent = text;
}

function obterIdFilme(filme) {
    return filme.id ?? filme.ID ?? 0;
}

function obterTituloFilme(filme) {
    return filme.title ?? filme.titulo ?? `Filme ${obterIdFilme(filme)}`;
}

async function carregarMinhasAvaliacoes() {
    showMessage("");
    const container = document.getElementById("listaAvaliacoes");
    container.innerHTML = "Carregando...";

    try {
        const filmesResponse = await fetch(API_FILMES);
        const filmes = await filmesResponse.json();

        if (!filmesResponse.ok || !Array.isArray(filmes)) {
            container.innerHTML = "Erro ao carregar filmes.";
            showMessage(filmes?.message || "Erro ao carregar filmes.");
            return;
        }

        if (filmes.length === 0) {
            container.innerHTML = "Nenhum filme cadastrado.";
            return;
        }

        const blocos = await Promise.all(
            filmes.map(async (filme) => {
                const filmID = obterIdFilme(filme);
                const filmeNome = obterTituloFilme(filme);

                let reviews = [];

                try {
                    const respReviews = await fetch(`${API_REVIEWS_FILME}/${filmID}`);
                    const dataReviews = await respReviews.json();

                    if (respReviews.ok && Array.isArray(dataReviews)) {
                        reviews = dataReviews;
                    }
                } catch (_) {
                    reviews = [];
                }

                return `
                    <div class="review-card">
                        <h3>${filmeNome}</h3>

                        <div class="outras-reviews">
                            <strong>Avaliações do filme:</strong>
                            ${
                                reviews.length === 0
                                ? `<div class="outra-review">Nenhuma avaliação para este filme.</div>`
                                : reviews.map(r => `
                                    <div class="outra-review">
                                        <div><strong>Usuário:</strong> ${r.username ?? r.userID ?? "-"}</div>
                                        <div><strong>Nota:</strong> ${r.rating ?? "-"}</div>
                                        <div><strong>Comentário:</strong> ${r.note ?? "-"}</div>
                                    </div>
                                `).join("")
                            }
                        </div>
                    </div>
                `;
            })
        );

        container.innerHTML = blocos.join("");

    } catch (e) {
        container.innerHTML = "Erro ao conectar com o servidor.";
        showMessage("Erro ao conectar com o servidor.");
    }
}

window.addEventListener("load", carregarMinhasAvaliacoes);
</script>

</body>
</html>
