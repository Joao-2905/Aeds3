<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <style>
        :root {
            --bg-body: #0f0f0f;
            --bg-container: #181818;
            --bg-input: #262626;
            --text-primary: #e4e4e4;
            --text-secondary: #9e9e9e;
            --accent: #bb86fc;
            --accent-hover: #d7b5fd;
            --border-color: #2f2f2f;
            --error-color: #ff6b6b;
            --success-color: #7ee787;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .signup-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, #1e1e1e, #141414);
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: var(--accent);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInFields 0.5s ease forwards;
        }

        .input-group:nth-child(1) { animation-delay: 0.2s; }
        .input-group:nth-child(2) { animation-delay: 0.3s; }
        .input-group:nth-child(3) { animation-delay: 0.4s; }

        @keyframes fadeInFields {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            background: #2d2d2d;
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.2);
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 52px;
        }

        .eye-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-button img {
            width: 26px;
            height: 26px;
            opacity: 0.8;
            transition: 0.2s;
        }

        .eye-button:hover img {
            opacity: 1;
            transform: scale(1.05);
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #bb86fc, #9a67ea);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-signup:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(187, 134, 252, 0.4);
        }

        .btn-signup:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            min-height: 20px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .message.error {
            color: var(--error-color);
        }

        .message.success {
            color: var(--success-color);
        }

        .login-link {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .movie-icon {
            font-size: 20px;
            margin-top: 20px;
            opacity: 0.3;
            display: block;
        }
    </style>
</head>

<body>

    <div class="signup-container">

        <h2>Criar Conta</h2>

        <form id="signupForm">

            <div class="input-group">
                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Seu nome de usuário"
                    required
                >
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>

                <input
                    type="email"
                    id="email"
                    placeholder="seu@email.com"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Senha</label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        required
                    >

                    <button
                        type="button"
                        class="eye-button"
                        id="togglePassword"
                        aria-label="Mostrar senha"
                        title="Mostrar senha"
                    >

                        <img
                            id="eyeIcon"
                            src="olho-fechado.png"
                            alt="Mostrar senha"
                        >

                    </button>

                </div>
            </div>

            <button
                type="submit"
                class="btn-signup"
                id="signupButton"
            >
                Finalizar Cadastro
            </button>

            <div id="message" class="message"></div>

        </form>

        <div class="login-link">
            Já possui uma conta?
            <a href="index.html">Entrar agora</a>
        </div>

        <span class="movie-icon">🎬</span>

    </div>

    <script>

        const signupForm = document.getElementById("signupForm");
        const signupButton = document.getElementById("signupButton");
        const messageBox = document.getElementById("message");

        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const eyeIcon = document.getElementById("eyeIcon");

        togglePassword.addEventListener("click", () => {

            const senhaEscondida =
                passwordInput.type === "password";

            if (senhaEscondida) {

                passwordInput.type = "text";

                eyeIcon.src = "olho-aberto.png";
                eyeIcon.alt = "Esconder senha";

                togglePassword.setAttribute(
                    "aria-label",
                    "Esconder senha"
                );

                togglePassword.setAttribute(
                    "title",
                    "Esconder senha"
                );

            } else {

                passwordInput.type = "password";

                eyeIcon.src = "olho-fechado.png";
                eyeIcon.alt = "Mostrar senha";

                togglePassword.setAttribute(
                    "aria-label",
                    "Mostrar senha"
                );

                togglePassword.setAttribute(
                    "title",
                    "Mostrar senha"
                );
            }
        });

        function showMessage(text, type = "error") {

            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
        }

        function clearMessage() {

            messageBox.textContent = "";
            messageBox.className = "message";
        }

        signupForm.addEventListener("submit", async function (e) {

            e.preventDefault();

            clearMessage();

            const username =
                document.getElementById("username")
                .value
                .trim();

            const email =
                document.getElementById("email")
                .value
                .trim();

            const password =
                document.getElementById("password")
                .value
                .trim();

            if (!username || !email || !password) {

                showMessage("Preencha todos os campos.");
                return;
            }

            signupButton.disabled = true;
            signupButton.textContent = "Cadastrando...";

            try {

                const response = await fetch(
                    "http://localhost:8080/auth/register",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password,
                            administrator: false,
                            administrador: false
                        })
                    }
                );

                let data = null;

                try {

                    data = await response.json();

                } catch (jsonError) {

                    data = null;
                }

                if (
                    response.ok &&
                    data &&
                    (data.id || data.ID)
                ) {

                    showMessage(
                        "Cadastro realizado com sucesso!",
                        "success"
                    );

                    setTimeout(() => {

                        window.location.href =
                            "index.html";

                    }, 1000);

                } else if (
                    data &&
                    data.message
                ) {

                    showMessage(
                        data.message,
                        "error"
                    );

                } else {

                    showMessage(
                        "Erro ao cadastrar usuário.",
                        "error"
                    );
                }

            } catch (error) {

                console.error(
                    "Erro no cadastro:",
                    error
                );

                showMessage(
                    "Erro ao conectar com o servidor.",
                    "error"
                );

            } finally {

                signupButton.disabled = false;
                signupButton.textContent =
                    "Finalizar Cadastro";
            }
        });

    </script>

</body>
</html>
