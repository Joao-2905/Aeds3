<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Usuários</title>

<style>
:root {
    --bg-body: #0f0f0f;
    --bg-container: #181818;
    --bg-input: #262626;
    --text-primary: #e4e4e4;
    --text-secondary: #9e9e9e;
    --accent: #bb86fc;
    --border-color: #2f2f2f;
    --danger: #cf6679;
    --success: #7ee787;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.top-nav {
    width: 100%;
    background: #121212;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    height: 70px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.tabs-nav-main { display: flex; height: 100%; gap: 15px; }

.tab-link {
    display: flex;
    align-items: center;
    padding: 0 15px;
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    transition: 0.3s;
}

.tab-link:hover { color: white; }

.tab-link::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0%;
    height: 3px;
    background: var(--accent);
    transition: 0.3s;
    transform: translateX(-50%);
}

.tab-link.active-link { color: var(--accent); }
.tab-link.active-link::after { width: 100%; }

.btn-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-color);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    color: var(--text-primary);
}

.btn-profile:hover {
    border-color: var(--accent);
    background: rgba(187, 134, 252, 0.05);
}

.user-info { text-align: right; }
.user-label { display: block; font-size: 10px; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; }
.user-name { display: block; font-size: 13px; font-weight: 600; }
.avatar { width: 24px; height: 24px; background: var(--accent); border-radius: 4px; }

.main-container {
    width: 95%;
    max-width: 900px;
    margin-top: 30px;
    margin-bottom: 30px;
    height: 80vh;
    border-radius: 14px;
    background: linear-gradient(145deg, #1e1e1e, #141414);
    box-shadow:
        0 15px 50px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.03);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.tab-nav {
    display: flex;
    background: #121212;
    border-bottom: 1px solid var(--border-color);
}

.tab-button {
    flex: 1;
    padding: 18px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1px;
    position: relative;
    transition: 0.3s;
}

.tab-button:hover { color: white; }

.tab-button::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0%;
    height: 3px;
    background: var(--accent);
    transition: 0.3s;
    transform: translateX(-50%);
}

.tab-button.active { color: var(--accent); }
.tab-button.active::after { width: 100%; }

.tab-content-wrapper {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.tab-section {
    display: none;
    animation: fadeIn 0.3s ease;
}

.tab-section.active { display: block; }

@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

h2 {
    margin-bottom: 25px;
    color: var(--accent);
    position: relative;
    padding-bottom: 8px;
}

h2::after {
    content: "";
    width: 50px;
    height: 2px;
    background: var(--accent);
    position: absolute;
    bottom: 0;
    left: 0;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group { margin-bottom: 20px; }

label { font-size: 13px; margin-bottom: 6px; display: block; }

input, select {
    width: 100%;
    padding: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
}

input:focus, select:focus {
    outline: none;
    border: 1px solid var(--accent);
    box-shadow: 0 0 8px rgba(187,134,252,0.4);
}

.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper input {
    padding-right: 52px;
}

.eye-button {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.eye-button img {
    width: 24px;
    height: 24px;
    opacity: 0.8;
    transition: 0.2s;
}

.eye-button:hover img {
    opacity: 1;
    transform: scale(1.05);
}

.search-box {
    display: flex;
    gap: 15px;
    background: rgba(255,255,255,0.03);
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    border: 1px solid var(--border-color);
    align-items: flex-end;
}

.btn-action {
    padding: 12px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.btn-save {
    background: linear-gradient(135deg, #bb86fc, #9a67ea);
    color: black;
}

.btn-update { margin-top: 25px; }
.btn-search { background: #333; color: white; }
.btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 14px; border-bottom: 1px solid var(--border-color); }
th { font-size: 12px; color: var(--accent); text-transform: uppercase; }
tbody tr:hover { background: rgba(255,255,255,0.03); }

.message {
    margin-top: 18px;
    font-size: 14px;
    font-weight: 600;
}

.message.error {
    color: var(--danger);
}

.message.success {
    color: var(--success);
}
</style>
</head>

<body>

<nav class="top-nav">
    <div class="tabs-nav-main">
        <a href="menuPrincipal.html" class="tab-link">Início</a>
        <a href="usuario.html" class="tab-link active-link">👥 Usuários</a>
        <a href="filmes.html" class="tab-link">🎬 Filmes</a>
        <a href="genero.html" class="tab-link">🏷️ Gêneros</a>
        <a href="avaliacao.html" class="tab-link">⭐ Avaliações</a>
    </div>

    <button class="btn-profile" type="button" id="btnProfile">
        <div class="user-info">
            <span class="user-label">Meu Perfil</span>
            <span class="user-name" id="userNameLabel">Administrador</span>
        </div>
        <div class="avatar"></div>
    </button>
</nav>

<div class="main-container">

<nav class="tab-nav">
<button class="tab-button active" onclick="openTab(event, 'lista')">Listar</button>
<button class="tab-button" onclick="openTab(event, 'cadastrar')">Cadastrar</button>
<button class="tab-button" onclick="openTab(event, 'atualizar')">Atualizar</button>
<button class="tab-button" onclick="openTab(event, 'excluir')">Excluir</button>
</nav>

<div class="tab-content-wrapper">

<section id="lista" class="tab-section active">
<h2>Usuários do Sistema</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Cargo</th>
</tr>
</thead>
<tbody id="tabelaUsuarios">
    <tr>
        <td colspan="4">Carregando usuários...</td>
    </tr>
</tbody>
</table>

<div id="listaMessage" class="message"></div>
</section>

<section id="cadastrar" class="tab-section">
<h2>Novo Usuário</h2>

<div class="form-grid">
<div class="form-group">
<label for="cadUsername">Username</label>
<input type="text" id="cadUsername">
</div>

<div class="form-group">
<label for="cadEmail">Email</label>
<input type="email" id="cadEmail">
</div>

<div class="form-group">
<label for="cadSenha">Senha</label>
<div class="password-wrapper">
<input type="password" id="cadSenha">
<button type="button" class="eye-button" id="toggleCadSenha" aria-label="Mostrar senha" title="Mostrar senha">
<img id="cadEyeIcon" src="olho-fechado.png" alt="Mostrar senha">
</button>
</div>
</div>

<div class="form-group">
<label for="cadTipo">Tipo de Conta</label>
<select id="cadTipo">
<option value="false">Usuário</option>
<option value="true">Administrador</option>
</select>
</div>
</div>

<button class="btn-action btn-save" id="btnCadastrarUsuario">Salvar</button>
<div id="cadastroMessage" class="message"></div>
</section>

<section id="atualizar" class="tab-section">
<h2>Atualizar Usuário</h2>

<div class="search-box">
<div style="flex:1">
<label for="buscarIdAtualizar">ID do usuário</label>
<input type="number" id="buscarIdAtualizar" placeholder="ID do usuário">
</div>
<button class="btn-action btn-search" id="btnBuscarAtualizar">Buscar</button>
</div>

<div class="form-grid">
<div class="form-group">
<label for="attUsername">Username</label>
<input type="text" id="attUsername">
</div>

<div class="form-group">
<label for="attEmail">Email</label>
<input type="email" id="attEmail">
</div>

<div class="form-group">
<label for="attSenha">Nova senha</label>
<div class="password-wrapper">
<input type="password" id="attSenha">
<button type="button" class="eye-button" id="toggleAttSenha" aria-label="Mostrar senha" title="Mostrar senha">
<img id="attEyeIcon" src="olho-fechado.png" alt="Mostrar senha">
</button>
</div>
</div>

<div class="form-group">
    <label for="attCargo">Cargo</label>
    <select id="attCargo">
        <option value="false">Usuário</option>
        <option value="true">Administrador</option>
    </select>
</div>
</div>

<button class="btn-action btn-save btn-update" id="btnAtualizarUsuario">Atualizar</button>
<div id="atualizarMessage" class="message"></div>
</section>

<section id="excluir" class="tab-section">
<h2>Excluir Usuário</h2>

<div class="search-box">
<div style="flex:1">
<label for="buscarIdExcluir">ID do usuário</label>
<input type="number" id="buscarIdExcluir" placeholder="ID do usuário">
</div>
<button class="btn-action btn-search" id="btnBuscarExcluir">Buscar</button>
</div>

<div id="usuarioExcluirPreview" style="margin-bottom: 20px; color: #9e9e9e;"></div>

<button class="btn-action btn-delete" id="btnExcluirUsuario">Excluir</button>
<div id="excluirMessage" class="message"></div>
</section>

</div>
</div>

<script>
const API_USUARIOS = "http://localhost:8080/usuarios";
const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));

let usuarioAtualParaAtualizar = null;

if (!usuarioLogado) {
    window.location.href = "index.html";
}

if (usuarioLogado.administrator !== true) {
    window.location.href = "menuUsuario.html";
}

function openTab(evt, tabName) {
    let tabs = document.getElementsByClassName("tab-section");
    let buttons = document.getElementsByClassName("tab-button");

    for (let t of tabs) t.classList.remove("active");
    for (let b of buttons) b.classList.remove("active");

    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");

    if (tabName === "lista") {
        carregarUsuarios();
    }
}

function showMessage(elementId, text, type = "error") {
    const el = document.getElementById(elementId);
    el.textContent = text;
    el.className = `message ${type}`;
}

function limparMessage(elementId) {
    const el = document.getElementById(elementId);
    el.textContent = "";
    el.className = "message";
}

function cargoTexto(user) {
    return user.administrator ? "Administrador" : "Usuário";
}

function configurarToggleSenha(inputId, buttonId, iconId) {
    const input = document.getElementById(inputId);
    const button = document.getElementById(buttonId);
    const icon = document.getElementById(iconId);

    button.addEventListener("click", function () {
        const senhaEscondida = input.type === "password";

        if (senhaEscondida) {
            input.type = "text";
            icon.src = "olho-aberto.png";
            icon.alt = "Esconder senha";
            button.setAttribute("aria-label", "Esconder senha");
            button.setAttribute("title", "Esconder senha");
        } else {
            input.type = "password";
            icon.src = "olho-fechado.png";
            icon.alt = "Mostrar senha";
            button.setAttribute("aria-label", "Mostrar senha");
            button.setAttribute("title", "Mostrar senha");
        }
    });
}

configurarToggleSenha("cadSenha", "toggleCadSenha", "cadEyeIcon");
configurarToggleSenha("attSenha", "toggleAttSenha", "attEyeIcon");

async function carregarUsuarios() {
    limparMessage("listaMessage");
    const tabela = document.getElementById("tabelaUsuarios");
    tabela.innerHTML = `<tr><td colspan="4">Carregando usuários...</td></tr>`;

    try {
        const response = await fetch(API_USUARIOS);
        const data = await response.json();

        if (!response.ok) {
            tabela.innerHTML = `<tr><td colspan="4">Erro ao carregar usuários.</td></tr>`;
            showMessage("listaMessage", "Erro ao carregar usuários.");
            return;
        }

        if (!Array.isArray(data) || data.length === 0) {
            tabela.innerHTML = `<tr><td colspan="4">Nenhum usuário cadastrado.</td></tr>`;
            return;
        }

        tabela.innerHTML = data.map(user => `
            <tr>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${user.email}</td>
                <td>${cargoTexto(user)}</td>
            </tr>
        `).join("");

    } catch (error) {
        tabela.innerHTML = `<tr><td colspan="4">Erro ao conectar com o servidor.</td></tr>`;
        showMessage("listaMessage", "Erro ao conectar com o servidor.");
    }
}

document.getElementById("btnCadastrarUsuario").addEventListener("click", async function () {
    limparMessage("cadastroMessage");

    const user = {
        username: document.getElementById("cadUsername").value.trim(),
        email: document.getElementById("cadEmail").value.trim(),
        password: document.getElementById("cadSenha").value.trim(),
        administrator: document.getElementById("cadTipo").value === "true"
    };

    if (!user.username || !user.email || !user.password) {
        showMessage("cadastroMessage", "Preencha todos os campos.");
        return;
    }

    try {
        const response = await fetch(API_USUARIOS, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(user)
        });

        const data = await response.json();

        if (response.ok && !data.message) {
            showMessage("cadastroMessage", "Usuário cadastrado com sucesso!", "success");
            document.getElementById("cadUsername").value = "";
            document.getElementById("cadEmail").value = "";
            document.getElementById("cadSenha").value = "";
            document.getElementById("cadSenha").type = "password";
            document.getElementById("cadEyeIcon").src = "olho-fechado.png";
            document.getElementById("cadTipo").value = "false";
            carregarUsuarios();
        } else {
            showMessage("cadastroMessage", data.message || "Erro ao cadastrar usuário.");
        }
    } catch (error) {
        showMessage("cadastroMessage", "Erro ao conectar com o servidor.");
    }
});

document.getElementById("btnBuscarAtualizar").addEventListener("click", async function () {
    limparMessage("atualizarMessage");

    const id = document.getElementById("buscarIdAtualizar").value.trim();
    if (!id) {
        showMessage("atualizarMessage", "Informe o ID do usuário.");
        return;
    }

    try {
        const response = await fetch(`${API_USUARIOS}/${id}`);
        const data = await response.json();

        if (response.ok && !data.message) {
            usuarioAtualParaAtualizar = data;

            document.getElementById("attUsername").value = data.username;
            document.getElementById("attEmail").value = data.email;
            document.getElementById("attSenha").value = "";
            document.getElementById("attSenha").type = "password";
            document.getElementById("attEyeIcon").src = "olho-fechado.png";
            document.getElementById("attCargo").value = String(data.administrator);
            showMessage("atualizarMessage", "Usuário carregado.", "success");
        } else {
            usuarioAtualParaAtualizar = null;
            showMessage("atualizarMessage", data.message || "Usuário não encontrado.");
        }
    } catch (error) {
        usuarioAtualParaAtualizar = null;
        showMessage("atualizarMessage", "Erro ao conectar com o servidor.");
    }
});

document.getElementById("btnAtualizarUsuario").addEventListener("click", async function () {
    limparMessage("atualizarMessage");

    const id = document.getElementById("buscarIdAtualizar").value.trim();
    const novaSenha = document.getElementById("attSenha").value.trim();

    const user = {
        id: parseInt(id),
        username: document.getElementById("attUsername").value.trim(),
        email: document.getElementById("attEmail").value.trim(),
        password: novaSenha,
        administrator: document.getElementById("attCargo").value === "true"
    };

    if (!id || !user.username || !user.email) {
        showMessage("atualizarMessage", "Preencha username e email.");
        return;
    }

    if (!novaSenha) {
        showMessage("atualizarMessage", "Informe a nova senha.");
        return;
    }

    if (usuarioAtualParaAtualizar && usuarioAtualParaAtualizar.password && novaSenha === usuarioAtualParaAtualizar.password) {
        showMessage("atualizarMessage", "A nova senha não pode ser igual à senha anterior.");
        return;
    }

    try {
        const response = await fetch(`${API_USUARIOS}/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(user)
        });

        const data = await response.json();

        if (response.ok && !data.message) {
            showMessage("atualizarMessage", "Usuário atualizado com sucesso!", "success");
            usuarioAtualParaAtualizar = data;
            document.getElementById("attSenha").value = "";
            document.getElementById("attSenha").type = "password";
            document.getElementById("attEyeIcon").src = "olho-fechado.png";
            carregarUsuarios();
        } else {
            showMessage("atualizarMessage", data.message || "Erro ao atualizar usuário.");
        }
    } catch (error) {
        showMessage("atualizarMessage", "Erro ao conectar com o servidor.");
    }
});

document.getElementById("btnBuscarExcluir").addEventListener("click", async function () {
    limparMessage("excluirMessage");
    document.getElementById("usuarioExcluirPreview").innerHTML = "";

    const id = document.getElementById("buscarIdExcluir").value.trim();
    if (!id) {
        showMessage("excluirMessage", "Informe o ID do usuário.");
        return;
    }

    try {
        const response = await fetch(`${API_USUARIOS}/${id}`);
        const data = await response.json();

        if (response.ok && !data.message) {
            document.getElementById("usuarioExcluirPreview").innerHTML = `
                <strong>ID:</strong> ${data.id}<br>
                <strong>Username:</strong> ${data.username}<br>
                <strong>Email:</strong> ${data.email}<br>
                <strong>Cargo:</strong> ${cargoTexto(data)}
            `;
            showMessage("excluirMessage", "Usuário encontrado.", "success");
        } else {
            showMessage("excluirMessage", data.message || "Usuário não encontrado.");
        }
    } catch (error) {
        showMessage("excluirMessage", "Erro ao conectar com o servidor.");
    }
});

document.getElementById("btnExcluirUsuario").addEventListener("click", async function () {
    limparMessage("excluirMessage");

    const id = document.getElementById("buscarIdExcluir").value.trim();
    if (!id) {
        showMessage("excluirMessage", "Informe o ID do usuário.");
        return;
    }

    try {
        const response = await fetch(`${API_USUARIOS}/${id}`, {
            method: "DELETE"
        });

        const data = await response.json();

        if (response.ok && !data.message) {
            showMessage("excluirMessage", "Usuário excluído com sucesso!", "success");
            document.getElementById("usuarioExcluirPreview").innerHTML = "";
            document.getElementById("buscarIdExcluir").value = "";
            carregarUsuarios();
        } else {
            showMessage("excluirMessage", data.message || "Erro ao excluir usuário.");
        }
    } catch (error) {
        showMessage("excluirMessage", "Erro ao conectar com o servidor.");
    }
});

const userNameLabel = document.getElementById("userNameLabel");
if (userNameLabel) {
    userNameLabel.textContent = usuarioLogado?.username || usuarioLogado?.email || "Usuário";
}

window.addEventListener("load", carregarUsuarios);

document.getElementById("btnProfile").addEventListener("click", function () {
    window.location.href = "profile.html";
});
</script>

</body>
</html>
