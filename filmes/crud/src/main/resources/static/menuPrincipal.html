<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Menu Principal</title>

<style>
:root {
    --bg-body: #0f0f0f;
    --bg-container: #181818;
    --text-primary: #e4e4e4;
    --text-secondary: #9e9e9e;
    --accent: #bb86fc;
    --border-color: #2f2f2f;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.top-nav {
    width: 100%;
    background: #121212;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    height: 70px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.tabs-nav-main {
    display: flex;
    height: 100%;
    gap: 15px;
}

.tab-link {
    display: flex;
    align-items: center;
    padding: 0 15px;
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    transition: 0.3s;
}

.tab-link:hover {
    color: white;
}

.tab-link::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0%;
    height: 3px;
    background: var(--accent);
    transition: 0.3s;
    transform: translateX(-50%);
}

.tab-link.active-link {
    color: var(--accent);
}

.tab-link.active-link::after {
    width: 100%;
}

.btn-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-color);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    color: var(--text-primary);
}

.btn-profile:hover {
    border-color: var(--accent);
    background: rgba(187, 134, 252, 0.05);
}

.user-info {
    text-align: right;
}

.user-label {
    display: block;
    font-size: 10px;
    color: var(--text-secondary);
    font-weight: 800;
    text-transform: uppercase;
}

.user-name {
    display: block;
    font-size: 13px;
    font-weight: 600;
}

.avatar {
    width: 24px;
    height: 24px;
    background: var(--accent);
    border-radius: 4px;
}

.main-container {
    width: 95%;
    max-width: 1000px;
    margin-top: 50px;
    background: linear-gradient(145deg, #1e1e1e, #141414);
    border-radius: 14px;
    padding: 50px;
    border: 1px solid rgba(255,255,255,0.03);
    box-shadow: 0 15px 50px rgba(0,0,0,0.7);
}

.dashboard-header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 20px;
}

.dashboard-header h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
}

.dashboard-header h2 {
    font-size: 18px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 10px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.stat-card {
    background-color: var(--bg-container);
    padding: 30px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.stat-card:hover {
    border-color: var(--accent);
    transform: translateY(-5px);
}

.stat-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 4px;
    background: var(--accent);
}

.stat-card span {
    display: block;
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.stat-value {
    font-size: 42px;
    font-weight: 800;
    color: var(--text-primary);
}
</style>
</head>

<body>

<nav class="top-nav">
    <div class="tabs-nav-main">
        <a href="menuPrincipal.html" class="tab-link active-link">Início</a>
        <a href="usuario.html" class="tab-link">👥 Usuários</a>
        <a href="filmes.html" class="tab-link">🎬 Filmes</a>
        <a href="genero.html" class="tab-link">🏷️ Gêneros</a>
        <a href="avaliacao.html" class="tab-link">⭐ Avaliações</a>
    </div>

    <button id="btnProfile" class="btn-profile" type="button">
        <div class="user-info">
            <span class="user-label">Meu Perfil</span>
            <span class="user-name" id="userNameLabel">Administrador</span>
        </div>
        <div class="avatar"></div>
    </button>
</nav>

<div class="main-container">
    <div class="dashboard-header">
        <h1>Menu Principal</h1>
        <h2>Gerenciamento do sistema</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span>Filmes</span>
            <div class="stat-value" id="countFilmes">0</div>
        </div>
    </div>
</div>

<script>
let usuarioLogado = null;

try {
    usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
} catch (e) {
    usuarioLogado = null;
}

if (!usuarioLogado) {
    window.location.href = "index.html";
}

if (usuarioLogado.administrator !== true) {
    window.location.href = "menuUsuario.html";
}

document.getElementById("userNameLabel").textContent =
    usuarioLogado.username || usuarioLogado.email || "Administrador";

document.getElementById("btnProfile").addEventListener("click", () => {
    window.location.href = "profile.html";
});

async function carregarQtdFilmes() {
    try {
        const res = await fetch("http://localhost:8080/filmes");
        const data = await res.json();

        if (res.ok && Array.isArray(data)) {
            document.getElementById("countFilmes").textContent = data.length;
        } else {
            document.getElementById("countFilmes").textContent = "0";
        }
    } catch (e) {
        document.getElementById("countFilmes").textContent = "0";
    }
}

carregarQtdFilmes();
</script>

</body>
</html>
